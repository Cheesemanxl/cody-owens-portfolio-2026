name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry acrcodyportfolioprod \
            --image backend:${{ github.sha }} \
            ./backend

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-cody-portfolio-backend \
            --resource-group rg-cody-portfolio-prod \
            --image acrcodyportfolioprod-d2erhye4ezcndzbh.azurecr.io/backend:${{ github.sha }}
